services:
  - type: web
    name: garmin-coach-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GARMIN_EMAIL
        sync: false          # introduiràs el valor a mà al panell de Render
      - key: GARMIN_PASSWORD
        sync: false
      - key: MCP_TOKEN
        generateValue: true  # Render el genera automàticament (segur!)
      - key: USER_NAME
        sync: false
      - key: USER_AGE
        sync: false
      - key: USER_SEX
        sync: false
      - key: USER_HEIGHT
        sync: false
      - key: USER_WEIGHT
        sync: false
      - key: USER_GOAL
        value: salut general
      - key: USER_LANG
        value: ca
